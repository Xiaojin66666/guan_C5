# ftd_encoder_decoder_mtl_lstm.yaml
_target_: src.models.ftd_module.FtdModule

# LSTM参数
input_size: 31
hidden_size: 128
num_layers: 4

# 多任务参数
task_sizes: [1, 1, 1, 1, 1, 1]  # 6个任务，每个任务输出1个值
task_names: ["Cy", "Cl", "Cm", "Cn", "CD", "CL"]

# 编码器-解码器参数
encoder_dims: [31, 512, 512, 128]  # 编码器维度
decoder_dims: [64, 512, 512]      # 解码器基础维度（不包含输出层）

# 模型结构参数
shared_layers: 1
task_specific_layers: 2
dropout: 0.1
encoder_batch_norm: false
decoder_batch_norm: false

# 训练参数
loss_term: "stch"  # 使用STCH多任务学习方法

optimizer:
  _target_: torch.optim.Adam
  _partial_: true
  lr: 0.001
  weight_decay: 0.0

scheduler:
  _target_: torch.optim.lr_scheduler.ReduceLROnPlateau
  _partial_: true
  mode: min
  factor: 0.1
  patience: 10

# 编译选项
compile: false

